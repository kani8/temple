name: Daily Fitness Plan

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron is UTC. This is 6:00am Pacific during daylight saving time.
    - cron: "0 13 * * *"

jobs:
  daily-plan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e .

      - name: Generate and email plan
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: fitness-os daily --email

      - name: Commit generated plan
        run: |
          git config user.name "fitness-os-bot"
          git config user.email "fitness-os-bot@users.noreply.github.com"
          git add data/menus data/plans
          git diff --cached --quiet || git commit -m "Add daily fitness plan"
          git push

